name: ncc_data_shaft
description: The official bridge between network_cool_client (ncc) and data_shaft. Provides standardized drivers and datasources for a clean data layer.
version: 1.0.1

homepage: https://github.com/coolosos/ncc_data_shaft
repository: https://github.com/coolosos/ncc_data_shaft
issue_tracker: https://github.com/coolosos/ncc_data_shaft/issues

topics:
  - clean-architecture
  - networking
  - session-management
  - data-layer
  - repository-pattern

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  ncc: ^1.0.0
  data_shaft: ^1.1.3
  meta: ^1.18.1

dev_dependencies:
  coolint: 2.1.2
  test: ^1.25.6
